<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./assets/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="./assets/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="./assets/favicon/site.webmanifest" />
    <title>Battleship</title>
</head>
<body>
    <div class="stats-cont minimized">
        <div class="wins-cont">
            W:
            <span class="win-count">0</span>
        </div>
        <img src="./assets/icons/bar-chart.svg" alt="Game Statistics" class="stats-icon">
        <div class="losses-cont">
            L:
            <span class="lose-count">0</span>
        </div>
    </div>


    <header class="page-header">
        <h1 class="page-title">
            Battleship
            <p class="creator-info">
                By <a href="https://github.com/Dur4nt3" class="github-profile" target="_blank" rel="noopener noreferrer">Durante</a>
            </p>
        </h1>
    </header>

    <main class="game-cont">
        <div class="game-info">
            <div class="player-side"></div>
            <div class="opponent-side"></div>
        </div>

        <!-- <button class="start-game">Start</button> -->
    </main>

    <footer>
        <a href="https://github.com/Dur4nt3/battleship_project" class="repo-link" rel="noopener noreferrer" target="_blank"><img src="./assets/icons/GitHub-mark-white.svg" alt="GitHub Repository"></a>
    </footer>
</body>
</html>
